apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat
  template:
    metadata:
      labels:
        app: chat
    spec:
      containers:
      - name: chat
        image: your-dockerhub-username/taskflow-chat:latest
        ports:
        - containerPort: 3004
        env:
        - name: MONGO_URI
          value: mongodb://mongo-service:27017/taskflow
        - name: PORT
          value: "3004"
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
spec:
  type: ClusterIP
  selector:
    app: chat
  ports:
  - port: 3004
    targetPort: 3004
    
