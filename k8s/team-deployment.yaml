apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: team
  template:
    metadata:
      labels:
        app: team
    spec:
      containers:
      - name: team
        image: your-dockerhub-username/taskflow-team:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3002
        env:
        - name: MONGO_URI
          value: mongodb://mongo-service:27017/taskflow
        - name: PORT
          value: "3002"
---
apiVersion: v1
kind: Service
metadata:
  name: team-service
spec:
  type: ClusterIP
  selector:
    app: team
  ports:
  - port: 3002
    targetPort: 3002
    
