apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task
  template:
    metadata:
      labels:
        app: task
    spec:
      containers:
      - name: task
        image: your-dockerhub-username/taskflow-task:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3003
        env:
        - name: MONGO_URI
          value: mongodb://mongo-service:27017/taskflow
        - name: PORT
          value: "3003"
---
apiVersion: v1
kind: Service
metadata:
  name: task-service
spec:
  type: ClusterIP
  selector:
    app: task
  ports:
  - port: 3003
    targetPort: 3003
    
