version: '3.8'

services:
  registry:
    image: registry:2
    container_name: taskflow-registry
    ports:
      - "5000:5000"
    networks:
      - default
      - minikube
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: taskflow-mongodb
    ports:
      - "27017:27017"
    volumes:
      - ${HOME}/taskflow_data/mongodb:/data/db

  auth-service:
    build: ./auth-service
    container_name: taskflow-auth
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/taskflow
      - PORT=3001
      - JWT_SECRET=supersecret
    depends_on:
      - mongodb

  team-service:
    build: ./team-service
    container_name: taskflow-team
    ports:
      - "3002:3002"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/taskflow
      - PORT=3002
    depends_on:
      - mongodb

  task-service:
    build: ./task-service
    container_name: taskflow-task
    ports:
      - "3003:3003"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/taskflow
      - PORT=3003
    depends_on:
      - mongodb

  chat-service:
    build: ./chat-service
    container_name: taskflow-chat
    ports:
      - "3004:3004"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/taskflow
      - PORT=3004
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: taskflow-frontend
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - team-service
      - task-service
      - chat-service

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: taskflow-jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - ${HOME}/taskflow_data/jenkins:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.kube:/root/.kube:ro
      - ${HOME}/.minikube:/home/yeet/.minikube:ro
    networks:
      - default
      - minikube
    restart: unless-stopped

  sonarqube:
    image: sonarqube:26.4.0.121862-community
    container_name: taskflow-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
      - SONAR_SEARCH_JAVAADDITIONALOPTS=-Des.cluster.routing.allocation.disk.threshold_enabled=false
    volumes:
      - ${HOME}/taskflow_data/sonarqube/data:/opt/sonarqube/data
      - ${HOME}/taskflow_data/sonarqube/extensions:/opt/sonarqube/extensions
      - ${HOME}/taskflow_data/sonarqube/logs:/opt/sonarqube/logs
    restart: unless-stopped

networks:
  minikube:
    external: true
